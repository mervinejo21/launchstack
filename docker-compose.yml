version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: launchstack_postgres
    restart: always
    environment:
      POSTGRES_USER: launchstack
      POSTGRES_PASSWORD: launchstack
      POSTGRES_DB: launchstack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: